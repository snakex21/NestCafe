<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NestCafe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        background: #171717;
      }

      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 42%, rgba(216, 223, 215, 0.08), transparent 26rem),
          linear-gradient(180deg, #171717 0%, #121212 100%);
      }

      .startup-screen {
        position: fixed;
        inset: 0;
        z-index: 2147483647;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 50% 44%, rgba(216, 223, 215, 0.1), transparent 24rem), #171717;
        color: #f4f4f0;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        opacity: 1;
        transition:
          opacity 360ms ease,
          visibility 360ms ease;
      }

      .startup-mark {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        transform: translateY(0);
        animation: startup-enter 560ms cubic-bezier(0.22, 1, 0.36, 1) both;
      }

      .startup-emblem {
        position: relative;
        display: grid;
        height: 2.5rem;
        width: 2.5rem;
        place-items: center;
        border: 1px solid rgba(244, 244, 240, 0.16);
        border-radius: 0.8rem;
        background: rgba(244, 244, 240, 0.06);
        box-shadow: 0 1.5rem 4rem rgba(0, 0, 0, 0.34);
        overflow: hidden;
      }

      .startup-emblem::before {
        content: '';
        position: absolute;
        inset: -35%;
        background: linear-gradient(
          110deg,
          transparent 32%,
          rgba(244, 244, 240, 0.2) 50%,
          transparent 68%
        );
        animation: startup-sheen 1.8s ease-in-out infinite;
      }

      .startup-emblem::after {
        content: '';
        height: 0.8rem;
        width: 0.8rem;
        border-radius: 999px;
        background: #d8dfd7;
        box-shadow: 0 0 1.25rem rgba(216, 223, 215, 0.46);
      }

      .startup-copy {
        display: grid;
        gap: 0.18rem;
      }

      .startup-title {
        font-size: 1rem;
        font-weight: 650;
        letter-spacing: -0.02em;
      }

      .startup-status {
        color: rgba(244, 244, 240, 0.55);
        font-size: 0.75rem;
      }

      .renderer-ready .startup-screen {
        visibility: hidden;
        opacity: 0;
      }

      @keyframes startup-enter {
        from {
          opacity: 0;
          transform: translateY(0.5rem) scale(0.98);
        }

        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      @keyframes startup-sheen {
        0% {
          transform: translateX(-45%) rotate(12deg);
        }

        55%,
        100% {
          transform: translateX(45%) rotate(12deg);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .startup-screen,
        .startup-mark,
        .startup-emblem::before {
          animation: none;
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="startup-screen" aria-label="NestCafe is loading" role="status">
      <div class="startup-mark">
        <div class="startup-emblem" aria-hidden="true"></div>
        <div class="startup-copy">
          <div class="startup-title">NestCafe</div>
          <div class="startup-status">Starting workspace</div>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script src="/theme-init.js"></script>
    <script type="module" src="/src/client/main.tsx"></script>
  </body>
</html>
